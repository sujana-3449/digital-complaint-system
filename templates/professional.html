<!DOCTYPE html>
<html>
<head>
    <title>Professional Complaint</title>

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            font-family:'Poppins', sans-serif;
            background: linear-gradient(135deg,#1f1c2c,#928dab);
            min-height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            padding:40px 0;
        }

        .container{
            background: rgba(255,255,255,0.15);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            padding:40px;
            width:480px;
            border-radius:20px;
            box-shadow:0 15px 40px rgba(0,0,0,0.3);
            border:1px solid rgba(255,255,255,0.3);
        }

        h2{
            text-align:center;
            color:white;
            margin-bottom:25px;
            font-weight:600;
            letter-spacing:1px;
        }

        form{
            display:flex;
            flex-direction:column;
        }

        input, select, textarea{
            width:100%;
            padding:10px;
            margin-bottom:15px;
            border:none;
            border-radius:8px;
            font-size:14px;
            outline:none;
        }

        textarea{
            resize:none;
            height:90px;
        }

        label{
            color:white;
            font-size:14px;
            margin-bottom:6px;
        }

        input[type="file"]{
            background:white;
            padding:6px;
        }

        button{
            padding:12px;
            border:none;
            border-radius:8px;
            font-size:15px;
            font-weight:500;
            cursor:pointer;
            background: linear-gradient(135deg,#ff512f,#dd2476);
            color:white;
            transition:0.3s ease;
        }

        button:hover{
            transform:translateY(-3px);
            box-shadow:0 8px 20px rgba(221,36,118,0.4);
        }

        button:active{
            transform:scale(0.97);
        }
    </style>
</head>

<body>

<div class="container">
    <h2>Professional Complaint Form</h2>

    <form method="POST" enctype="multipart/form-data">
        <input type="text" name="roll" placeholder="Roll No" required>
        <input type="text" name="name" placeholder="Name" required>
        <input type="text" name="year" placeholder="Year" required>
        <input type="text" name="department" placeholder="Department" required>

        <label>Select Issue</label>
        <select name="issue" required>
            {% for issue in issues %}
            <option value="{{issue}}">{{issue}}</option>
            {% endfor %}
        </select>
        <label>Select Priority</label>

        <select name="priority" required>
        <option value="">Choose Priority</option>
        <option value="Low">Low</option>
        <option value="Medium">Medium</option>
        <option value="High">High</option>
        </select>

        <label>Upload Image (Optional)</label>
        <input type="file" name="image">

        <input type="text" name="title" placeholder="Complaint Title" required>

        <textarea name="description" placeholder="Description" required></textarea>

        <button type="submit">Submit Complaint</button>
		<a href="/" class="back-btn">⬅ Back</a>
    </form>
</div>

</body>
</html>
