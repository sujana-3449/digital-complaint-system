<!DOCTYPE html>
<html>
<head>
    <title>Complaint System</title>

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            padding: 50px 40px;
            width: 420px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.4);
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        h1 {
            color: #ffffff;
            font-size: 24px;
            font-weight: 600;
            margin-bottom: 35px;
            letter-spacing: 1px;
        }

        a {
            text-decoration: none;
        }

        button {
            width: 100%;
            padding: 13px;
            margin: 10px 0;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            background: linear-gradient(135deg, #4facfe, #00f2fe);
            color: #fff;
            transition: all 0.3s ease;
            letter-spacing: 0.5px;
        }

        button:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(0, 242, 254, 0.4);
        }

        button:active {
            transform: scale(0.98);
        }
    </style>
</head>

<body>
<div class="container">
    <h1>Digital Complaint Handling and Tracking System</h1>

    <a href="/principal_login">
        <button>Principal Login</button>
    </a>

    <a href="/student">
        <button>Student</button>
    </a>

    <a href="/conf_login">
        <button>Confidential Admin</button>
    </a>

    <a href="/prof_login">
        <button>Professional Admin</button>
    </a>

</div>
</body>
</html>
